name: Build musl ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Setup zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build
        env:
          # Override fat LTO and single codegen-unit from release profile to speed up CI
          CARGO_PROFILE_RELEASE_LTO: thin
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 4
          # Disable _FORTIFY_SOURCE to avoid musl incompatibility
          CFLAGS_aarch64_unknown_linux_musl: "-D_FORTIFY_SOURCE=0"
          CXXFLAGS_aarch64_unknown_linux_musl: "-D_FORTIFY_SOURCE=0"
        run: |
          cargo zigbuild --release --target aarch64-unknown-linux-musl --locked --bin zeroclaw -j4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64-musl
          path: target/aarch64-unknown-linux-musl/release/zeroclaw
          retention-days: 7
