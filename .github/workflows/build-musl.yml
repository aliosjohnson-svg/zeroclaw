name: Build musl ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl cross toolchain
        run: |
          sudo apt update
          sudo apt install -y musl-tools
          # 用 zig 作为交叉编译器，比 musl-cross 更简单可靠
          pip3 install ziglang
          # 验证
          zig version

      - name: Configure cargo
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-musl-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]
          EOF
          
          # 创建 zig cc 包装脚本
          cat > /usr/local/bin/aarch64-linux-musl-gcc << 'SCRIPT'
          #!/bin/sh
          zig cc -target aarch64-linux-musl "$@"
          SCRIPT
          chmod +x /usr/local/bin/aarch64-linux-musl-gcc
          
          cat > /usr/local/bin/aarch64-linux-musl-g++ << 'SCRIPT'
          #!/bin/sh
          zig c++ -target aarch64-linux-musl "$@"
          SCRIPT
          chmod +x /usr/local/bin/aarch64-linux-musl-g++

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-musl-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-musl-gcc
          CXX_aarch64_unknown_linux_musl: aarch64-linux-musl-g++
          AR_aarch64_unknown_linux_musl: llvm-ar
          CFLAGS_aarch64_unknown_linux_musl: "-D_FORTIFY_SOURCE=0"
        run: |
          cargo build --release --target aarch64-unknown-linux-musl --locked -j2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64-musl
          path: target/aarch64-unknown-linux-musl/release/zeroclaw
          retention-days: 7
