name: Build musl ARM64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross-compile tools
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            musl-tools \
            musl-dev

      - name: Configure cargo
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          rustflags = [
            "-C", "link-arg=-lgcc",
          ]
          EOF

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_musl: aarch64-linux-gnu-g++
          SQLITE3_MUSL: "1"
          LIBSQLITE3_FLAGS: "-DSQLITE_OS_UNIX=1 -D_FILE_OFFSET_BITS=0"
          CFLAGS_aarch64_unknown_linux_musl: "-D_FILE_OFFSET_BITS=0 -DSQLITE_OS_UNIX=1"
        run: |
          cargo build --release --target aarch64-unknown-linux-musl --locked -j2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64-musl
          path: target/aarch64-unknown-linux-musl/release/zeroclaw
          retention-days: 7
